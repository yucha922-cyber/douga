<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Canvas Video Editor — 9:16</title>
<link rel="stylesheet" href="styles.css" />
<style>
  body { background: #0b0e14; color: #e6e8ee; font-family: system-ui, -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif; margin: 0; }
  .cve-wrap { max-width: 1200px; margin: 0 auto; padding: 24px; display: grid; grid-template-columns: 360px 1fr; gap: 24px; }
  .cve-stage { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .cve-canvas-frame {
    width: min(100%, 360px); aspect-ratio: 9 / 16;
    background: #000; border-radius: 12px; overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,.5);
  }
  #stage { width: 100%; height: 100%; display: block; }
  .cve-transport { display: flex; gap: 8px; align-items: center; width: min(100%, 360px); }
  .cve-transport input[type=range] { flex: 1; }
  .cve-panel { background: #131826; border-radius: 12px; padding: 16px; box-shadow: 0 4px 16px rgba(0,0,0,.3); }
  .cve-panel + .cve-panel { margin-top: 16px; }
  .cve-panel h3 { margin: 0 0 12px; font-size: 14px; letter-spacing: .04em; text-transform: uppercase; color: #9aa5c4; }
  .cve-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .cve-row label { font-size: 12px; color: #9aa5c4; min-width: 92px; }
  .cve-row input[type=text], .cve-row input[type=number], .cve-row textarea, .cve-row select {
    flex: 1; min-width: 0;
    background: #0b0e14; color: #e6e8ee; border: 1px solid #2a3149;
    border-radius: 6px; padding: 8px; font-size: 13px; font-family: inherit;
  }
  .cve-row input[type=color] { width: 36px; height: 28px; border: none; background: transparent; padding: 0; }
  .cve-row textarea { min-height: 120px; resize: vertical; }
  .cve-btn {
    background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white;
    border: none; border-radius: 6px; padding: 8px 14px; font-size: 13px;
    cursor: pointer; font-weight: 600;
  }
  .cve-btn.secondary { background: #2a3149; }
  .cve-btn:disabled { opacity: .5; cursor: not-allowed; }
  .cve-drop {
    border: 2px dashed #2a3149; border-radius: 10px; padding: 20px; text-align: center;
    color: #9aa5c4; font-size: 13px; cursor: pointer; transition: .2s;
  }
  .cve-drop.hover { border-color: #8b5cf6; background: #1a2138; color: #e6e8ee; }
  .cve-media-list { list-style: none; padding: 0; margin: 12px 0 0; }
  .cve-media-list li {
    display: flex; gap: 8px; align-items: center; justify-content: space-between;
    padding: 8px; background: #0b0e14; border-radius: 6px; margin-bottom: 6px; font-size: 12px;
  }
  .cve-media-list .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cve-media-list .dur { color: #9aa5c4; }
  .cve-media-list button { background: transparent; color: #ef4444; border: none; cursor: pointer; font-size: 16px; }
  .cve-schedule { font-size: 11px; color: #9aa5c4; margin-top: 8px; max-height: 140px; overflow: auto; }
  .cve-schedule div { padding: 2px 0; }
  @media (max-width: 880px) {
    .cve-wrap { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="cve-wrap">

  <!-- Left: stage -->
  <div class="cve-stage">
    <div class="cve-canvas-frame">
      <canvas id="stage" width="1080" height="1920"></canvas>
    </div>
    <div class="cve-transport">
      <button class="cve-btn" id="playBtn">▶</button>
      <input type="range" id="seek" min="0" max="0" step="0.01" value="0" />
      <span id="timeLabel" style="font-size:12px;color:#9aa5c4;min-width:80px;text-align:right;">0.0 / 0.0</span>
    </div>
  </div>

  <!-- Right: controls -->
  <div>
    <div class="cve-panel">
      <h3>1. メディア (9:16)</h3>
      <div class="cve-drop" id="drop">
        ここに動画ファイルをドラッグ＆ドロップ<br />
        または <u>クリックして選択</u>（複数可・連結再生）
      </div>
      <input type="file" id="fileInput" accept="video/*" multiple hidden />
      <ul class="cve-media-list" id="mediaList"></ul>
    </div>

    <div class="cve-panel">
      <h3>2. テキスト（自動配置）</h3>
      <div class="cve-row">
        <label>テキスト一覧</label>
        <textarea id="textInput" placeholder="1行に1つのテキストを入力&#10;例:&#10;こんにちは&#10;Canvas で&#10;動画を編集"></textarea>
      </div>
      <div class="cve-row">
        <label>配置モード</label>
        <select id="distributeMode">
          <option value="even">均等割り (each = total / N)</option>
          <option value="sequential">順次表示 (各 3 秒)</option>
        </select>
        <input type="number" id="perDuration" value="3" step="0.5" min="0.5" style="max-width:80px" />
      </div>
      <button class="cve-btn" id="applyText">タイムラインに反映</button>
      <div class="cve-schedule" id="schedule"></div>
    </div>

    <div class="cve-panel">
      <h3>3. スタイル（縁取り Stroke）</h3>
      <div class="cve-row">
        <label>フォントサイズ</label>
        <input type="number" id="fontSize" value="96" min="20" max="300" />
      </div>
      <div class="cve-row">
        <label>文字色</label>
        <input type="color" id="fillColor" value="#ffffff" />
        <label>縁取り色</label>
        <input type="color" id="strokeColor" value="#000000" />
      </div>
      <div class="cve-row">
        <label>縁取り太さ</label>
        <input type="range" id="strokeWidth" min="0" max="40" value="12" step="1" />
        <span id="strokeWidthLabel" style="font-size:12px;color:#9aa5c4;min-width:40px;text-align:right;">12 px</span>
      </div>
      <div class="cve-row">
        <label>縦位置 (%)</label>
        <input type="range" id="posY" min="0" max="100" value="78" />
      </div>
      <div class="cve-row">
        <label>フォント</label>
        <select id="fontFamily">
          <option value='"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif'>ゴシック</option>
          <option value='"Hiragino Mincho ProN","Yu Mincho",serif'>明朝</option>
          <option value='Impact,"Hiragino Sans",sans-serif'>インパクト</option>
        </select>
        <label style="min-width:auto"><input type="checkbox" id="bold" checked /> 太字</label>
      </div>
    </div>
  </div>
</div>

<script src="canvas-editor.js"></script>
</body>
</html>
